# ============================================================================
# wheels.yml — Build binary wheels + sdist and publish to PyPI
# ============================================================================
# Triggered by pushing a version tag:  git tag v0.6.0 && git push --tags
#
# Strategy:
#   • cibuildwheel builds manylinux / musllinux / macOS / Windows wheels
#     for CPython 3.10, 3.11, 3.12 across x86_64 and arm64.
#   • A pure sdist is also built (for the pure-Python fallback on any platform).
#   • All artefacts are uploaded to PyPI in a single Trusted Publisher job.
#
# Prerequisites (one-time setup):
#   1. On PyPI: Settings → Publishing → Add publisher
#        owner:      LCherryholmes
#        repo:       SNOBOL4python
#        workflow:   wheels.yml
#        environment: pypi
#   2. On GitHub: Environments → create "pypi"
# ============================================================================

name: Build & Publish Wheels

on:
  push:
    tags:
      - "v*"                  # e.g. v0.6.0
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  # --------------------------------------------------------------------------
  # 1. Build wheels with cibuildwheel
  # --------------------------------------------------------------------------
  build-wheels:
    name: "Wheel · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.20.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # CPython 3.10–3.12 on x86_64 and arm64; skip PyPy and 32-bit
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP:  "*-win32 *-manylinux_i686 *-musllinux_i686 pp*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          # Run the test suite inside each wheel environment
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests -v"
          # Ensure the pure-Python fallback still passes even without the .so
          CIBW_TEST_COMMAND_PURE: >
            SNOBOL4_BACKEND=pure pytest {project}/tests -v

      - name: Upload wheel artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # --------------------------------------------------------------------------
  # 2. Build sdist (pure source, contains the C sources for pip to compile)
  # --------------------------------------------------------------------------
  build-sdist:
    name: "sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artefact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --------------------------------------------------------------------------
  # 3. Publish everything to PyPI via OIDC Trusted Publisher (no tokens)
  # --------------------------------------------------------------------------
  publish:
    name: "Publish to TestPyPI"
    uses: pypa/gh-action-pypi-publish@release/v1
    with:
      repository-url: https://test.pypi.org/legacy/
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write          # required for OIDC trusted publishing

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — PyPI Trusted Publisher handles auth via OIDC
