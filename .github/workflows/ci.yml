# ============================================================================
# ci.yml — Run tests on every push and pull request
# ============================================================================
# Matrix: Linux / macOS / Windows  ×  Python 3.10 / 3.11 / 3.12
# ============================================================================

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Test · ${{ matrix.os }} · py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build + test dependencies
        run: pip install setuptools wheel build pytest

      - name: Remove any stale built extensions
        run: find . -name "*.so" -delete -o -name "*.pyd" -delete
        shell: bash

      - name: Build and install package (with C extension)
        run: pip install ".[test]"

      - name: Check C extension availability
        id: check_c
        shell: bash
        run: |
          if python -c "import sno4py" 2>/dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::sno4py C extension not available — C backend tests will be skipped"
          fi

      - name: Run tests — pure-Python backend
        run: pytest tests/ -v
        env:
          SNOBOL4_BACKEND: pure

      - name: Run tests — C backend
        if: steps.check_c.outputs.available == 'true'
        run: pytest tests/ -v
        env:
          SNOBOL4_BACKEND: c