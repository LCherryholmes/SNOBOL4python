# ============================================================================
# ci.yml — Run tests on every push and pull request
# ============================================================================
# Matrix: Linux / macOS / Windows  ×  Python 3.10 / 3.11 / 3.12
# Both backends are exercised; the C backend is skipped gracefully on
# platforms where the extension fails to build.
# ============================================================================

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Test · ${{ matrix.os }} · py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: pip install setuptools wheel pytest

      - name: Build C extension in-place
        run: python setup.py build_ext --inplace
        continue-on-error: true          # pure-Python fallback if C fails

      - name: Install package (editable)
        run: pip install -e ".[test]"

      - name: Run tests — both backends
        run: pytest tests/ src/sno4py/tests/ -v

      - name: Run tests — pure-Python backend only
        run: pytest tests/ -v
        env:
          SNOBOL4_BACKEND: pure
